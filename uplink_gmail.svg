<svg viewBox="0 0 350 70" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="grad-cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#7f00ff" />
    </linearGradient>
  </defs>

  <style>
    @keyframes pulse-light {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes slide-line {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .bg-badge { fill: #0b0f19; }
    .pulse-glow { animation: pulse-light 2s ease-in-out infinite; }
    .scanning-line {
      animation: slide-line 3s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg-badge" rx="6" stroke="#1f2d3d" stroke-width="1.5" />
  <rect width="100%" height="100%" class="bg-badge" rx="6" stroke="#00f2fe" stroke-width="1" opacity="0.15" />

  <!-- Corner indicators -->
  <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#00f2fe" stroke-width="2" />
  <path d="M 345 15 L 345 5 L 335 5" fill="none" stroke="#00f2fe" stroke-width="2" />
  <path d="M 5 55 L 5 65 L 15 65" fill="none" stroke="#00f2fe" stroke-width="2" />
  <path d="M 345 55 L 345 65 L 335 65" fill="none" stroke="#00f2fe" stroke-width="2" />

  <!-- Animated Scanner Laser -->
  <g clip-path="url(#badge-clip)">
    <line x1="0" y1="0" x2="0" y2="70" stroke="#00f2fe" stroke-width="1" opacity="0.3" class="scanning-line" filter="url(#glow-cyan)" />
  </g>

  <!-- Icon (Stylized SMTP Console) -->
  <g transform="translate(20, 15)">
    <rect width="40" height="40" fill="#111827" stroke="#00f2fe" stroke-width="1.5" rx="4" />
    <path d="M 10 15 L 20 25 L 30 15" fill="none" stroke="#00f2fe" stroke-width="2" />
    <rect x="8" y="12" width="24" height="16" fill="none" stroke="#00f2fe" stroke-width="1.5" rx="1" />
    <circle cx="20" cy="20" r="10" fill="none" stroke="#ff007f" stroke-width="1" opacity="0.5" stroke-dasharray="2, 2" />
  </g>

  <!-- Text Details -->
  <g transform="translate(75, 12)">
    <text x="0" y="15" fill="#00f2fe" font-family="'Fira Code', monospace" font-size="11" font-weight="bold" letter-spacing="1">UPLINK::SMTP_GATEWAY</text>
    <text x="0" y="32" fill="#c9d1d9" font-family="'Fira Code', monospace" font-size="10">imtiazali17314@gmail.com</text>
    <text x="0" y="45" fill="#39ff14" font-family="'Fira Code', monospace" font-size="8" font-weight="bold" class="pulse-glow">> STATUS: CONNECT_READY</text>
  </g>
</svg>
