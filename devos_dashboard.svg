<svg viewBox="0 0 800 450" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glowing Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2d3d" stroke-width="1" opacity="0.3" />
    </pattern>

    <!-- Gradients -->
    <linearGradient id="grad-cyan-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#7f00ff" />
    </linearGradient>
    <linearGradient id="grad-purple-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
  </defs>

  <style>
    /* Keyframe Animations */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes core-pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(0,242,254,0.6)); }
      50% { transform: scale(1.03); filter: drop-shadow(0 0 20px rgba(0,242,254,0.9)); }
    }
    @keyframes dash-flow {
      to { stroke-dashoffset: -40; }
    }
    @keyframes text-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes wave-flow {
      0% { transform: translateX(0); }
      100% { transform: translateX(-160px); }
    }
    @keyframes load-log-1 {
      0%, 15% { opacity: 0; }
      20%, 100% { opacity: 1; }
    }
    @keyframes load-log-2 {
      0%, 35% { opacity: 0; }
      40%, 100% { opacity: 1; }
    }
    @keyframes load-log-3 {
      0%, 55% { opacity: 0; }
      60%, 100% { opacity: 1; }
    }
    @keyframes load-log-4 {
      0%, 75% { opacity: 0; }
      80%, 100% { opacity: 1; }
    }

    /* Target Styles */
    .bg-main { fill: #0b0f19; }
    .bg-grid { fill: url(#grid); }
    .spin-slow {
      animation: spin 20s linear infinite;
      transform-origin: 670px 225px;
    }
    .spin-fast {
      animation: spin-reverse 8s linear infinite;
      transform-origin: 670px 225px;
    }
    .pulse-glow {
      animation: pulse 3s ease-in-out infinite;
    }
    .core-node {
      animation: core-pulse 4s ease-in-out infinite;
      transform-origin: 400px 225px;
    }
    .circuit-trace {
      stroke-dasharray: 8, 12;
      animation: dash-flow 2s linear infinite;
    }
    .circuit-static {
      stroke: #1f2d3d;
      stroke-width: 2;
      fill: none;
    }
    .cursor {
      animation: text-blink 1s steps(2, start) infinite;
    }
    .wave-line {
      animation: wave-flow 4s linear infinite;
    }
    .log-line-1 { animation: load-log-1 6s infinite; }
    .log-line-2 { animation: load-log-2 6s infinite; }
    .log-line-3 { animation: load-log-3 6s infinite; }
    .log-line-4 { animation: load-log-4 6s infinite; }
  </style>

  <!-- Main Background -->
  <rect width="100%" height="100%" class="bg-main" rx="12" />
  <rect width="100%" height="100%" class="bg-grid" rx="12" />

  <!-- Outer Sci-Fi UI Borders -->
  <rect x="15" y="15" width="770" height="420" fill="none" stroke="#1f2d3d" stroke-width="1.5" rx="8" />
  <rect x="22" y="22" width="756" height="406" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.2" rx="6" />

  <!-- Corner Graphic Accents -->
  <path d="M 15 45 L 15 15 L 45 15" fill="none" stroke="#00f2fe" stroke-width="3" />
  <path d="M 785 45 L 785 15 L 755 15" fill="none" stroke="#00f2fe" stroke-width="3" />
  <path d="M 15 405 L 15 435 L 45 435" fill="none" stroke="#00f2fe" stroke-width="3" />
  <path d="M 785 405 L 785 435 L 755 435" fill="none" stroke="#00f2fe" stroke-width="3" />

  <!-- Header Panel -->
  <rect x="35" y="30" width="300" height="28" fill="#111827" stroke="#1f2d3d" stroke-width="1" rx="4" />
  <circle cx="50" cy="44" r="5" fill="#ff007f" />
  <circle cx="50" cy="44" r="5" fill="#ff007f" class="pulse-glow" />
  <text x="65" y="49" fill="#c9d1d9" font-family="'Fira Code', monospace" font-size="11" letter-spacing="1">DEV_OS::ARCHITECTURE_SCHEMATIC</text>

  <!-- ================= CIRCUITS SECTION ================= -->
  <g opacity="0.8">
    <!-- Center to Left (Diagnostics) -->
    <path class="circuit-static" d="M 400 225 L 280 225 L 240 130 L 180 130" />
    <path class="circuit-static" d="M 280 225 L 240 320 L 180 320" />
    
    <!-- Center to Right Radar -->
    <path class="circuit-static" d="M 400 225 L 560 225" />

    <!-- Center to Top (Automation QA Node) -->
    <path class="circuit-static" d="M 400 225 L 400 95" />
    
    <!-- Flowing Signals (Dash-flow) -->
    <path d="M 400 225 L 280 225 L 240 130 L 180 130" fill="none" stroke="#00f2fe" stroke-width="2" class="circuit-trace" />
    <path d="M 280 225 L 240 320 L 180 320" fill="none" stroke="#7f00ff" stroke-width="2" class="circuit-trace" />
    <path d="M 400 225 L 560 225" fill="none" stroke="#39ff14" stroke-width="2" class="circuit-trace" />
    <path d="M 400 225 L 400 95" fill="none" stroke="#ff007f" stroke-width="2" class="circuit-trace" />
  </g>

  <!-- ================= SYSTEM NODES ================= -->

  <!-- 1. Central Core Node (IMTIAZ_ALI.SYS) -->
  <g class="core-node">
    <circle cx="400" cy="225" r="45" fill="#111827" stroke="url(#grad-cyan-purple)" stroke-width="3" filter="url(#glow-cyan)" />
    <circle cx="400" cy="225" r="32" fill="#0b0f19" stroke="#00f2fe" stroke-width="1" stroke-dasharray="4, 4" class="spin-slow" />
    <text x="400" y="221" fill="#00f2fe" font-family="'Fira Code', monospace" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">IMTIAZ</text>
    <text x="400" y="235" fill="#c9d1d9" font-family="'Fira Code', monospace" font-size="10" text-anchor="middle">CORE.sys</text>
  </g>

  <!-- 2. Backend Engine Subsystem (Left Top) -->
  <g>
    <rect x="40" y="90" width="140" height="75" fill="#111827" stroke="#00f2fe" stroke-width="1.5" rx="6" />
    <rect x="40" y="90" width="140" height="4" fill="#00f2fe" rx="2" />
    <text x="50" y="110" fill="#00f2fe" font-family="'Fira Code', monospace" font-size="11" font-weight="bold">BACKEND_ENGINE</text>
    <text x="50" y="128" fill="#c9d1d9" font-family="'Fira Code', monospace" font-size="10">Node.js / Laravel</text>
    <text x="50" y="145" fill="#8892b0" font-family="'Fira Code', monospace" font-size="9">Active / Scalable</text>
    <circle cx="165" cy="142" r="4" fill="#39ff14" class="pulse-glow" />
  </g>

  <!-- 3. Frontend UI Subsystem (Left Bottom) -->
  <g>
    <rect x="40" y="280" width="140" height="75" fill="#111827" stroke="#7f00ff" stroke-width="1.5" rx="6" />
    <rect x="40" y="280" width="140" height="4" fill="#7f00ff" rx="2" />
    <text x="50" y="300" fill="#7f00ff" font-family="'Fira Code', monospace" font-size="11" font-weight="bold">FRONTEND_UI</text>
    <text x="50" y="318" fill="#c9d1d9" font-family="'Fira Code', monospace" font-size="10">React / Vue / Electron</text>
    <text x="50" y="335" fill="#8892b0" font-family="'Fira Code', monospace" font-size="9">Dynamic Web/App</text>
    <circle cx="165" cy="332" r="4" fill="#39ff14" class="pulse-glow" />
  </g>

  <!-- 4. Quality QA Subsystem (Center Top) -->
  <g>
    <rect x="310" y="35" width="180" height="60" fill="#111827" stroke="#ff007f" stroke-width="1.5" rx="6" />
    <rect x="310" y="35" width="180" height="4" fill="#ff007f" rx="2" />
    <text x="320" y="52" fill="#ff007f" font-family="'Fira Code', monospace" font-size="11" font-weight="bold">🛡️ AUTOMATION_QA</text>
    <text x="320" y="70" fill="#c9d1d9" font-family="'Fira Code', monospace" font-size="10">Playwright E2E Engineer</text>
    <text x="320" y="85" fill="#39ff14" font-family="'Fira Code', monospace" font-size="9" font-weight="bold">> TEST_PASS: 100%</text>
  </g>

  <!-- ================= RADAR HUD PANEL (Right) ================= -->
  <g class="spin-slow">
    <circle cx="670" cy="225" r="75" fill="none" stroke="#1f2d3d" stroke-width="1.5" />
    <circle cx="670" cy="225" r="55" fill="none" stroke="#00f2fe" stroke-width="1.5" stroke-dasharray="6, 12" />
    <circle cx="670" cy="225" r="35" fill="none" stroke="#7f00ff" stroke-width="1" stroke-dasharray="2, 6" />
  </g>
  <g class="spin-fast">
    <circle cx="670" cy="225" r="65" fill="none" stroke="#39ff14" stroke-width="1.5" stroke-dasharray="10, 40" opacity="0.8" />
    <line x1="670" y1="225" x2="670" y2="150" stroke="#39ff14" stroke-width="2" opacity="0.6" filter="url(#glow-green)" />
  </g>
  <circle cx="670" cy="225" r="4" fill="#ff007f" />
  <circle cx="630" cy="200" r="3" fill="#00f2fe" class="pulse-glow" />
  <circle cx="700" cy="250" r="3" fill="#39ff14" class="pulse-glow" />

  <!-- Radar Coordinates / Accents -->
  <text x="670" y="140" fill="#1f2d3d" font-family="'Fira Code', monospace" font-size="9" text-anchor="middle">N 00°</text>
  <text x="670" y="318" fill="#1f2d3d" font-family="'Fira Code', monospace" font-size="9" text-anchor="middle">S 180°</text>
  <text x="752" y="228" fill="#1f2d3d" font-family="'Fira Code', monospace" font-size="9">E 90°</text>
  <text x="568" y="228" fill="#1f2d3d" font-family="'Fira Code', monospace" font-size="9" text-anchor="end">W 270°</text>

  <!-- ================= TERMINAL OUTPUT (Center Bottom) ================= -->
  <g>
    <!-- Terminal Background -->
    <rect x="220" y="295" width="360" height="110" fill="#090d16" stroke="#1f2d3d" stroke-width="1.5" rx="6" />
    
    <!-- Header -->
    <rect x="220" y="295" width="360" height="20" fill="#111827" stroke="#1f2d3d" stroke-width="1" rx="4" />
    <circle cx="235" cy="305" r="4" fill="#ef4444" />
    <circle cx="247" cy="305" r="4" fill="#f59e0b" />
    <circle cx="259" cy="305" r="4" fill="#10b981" />
    <text x="275" y="309" fill="#8892b0" font-family="'Fira Code', monospace" font-size="9">bash - active_process_log</text>

    <!-- Log Lines with Delayed Keyframe Triggers -->
    <g font-family="'Fira Code', monospace" font-size="10" fill="#39ff14">
      <g class="log-line-1">
        <text x="235" y="335" fill="#7f00ff">> system_init</text>
        <text x="350" y="335" fill="#00f2fe">[ OK ]</text>
      </g>
      <g class="log-line-2">
        <text x="235" y="355">> load_subsystems</text>
        <text x="350" y="355" fill="#00f2fe">[ 100% ]</text>
      </g>
      <g class="log-line-3">
        <text x="235" y="375">> playwright_e2e_checks</text>
        <text x="400" y="375" fill="#39ff14">[ PASSING ]</text>
      </g>
      <g class="log-line-4">
        <text x="235" y="395">> status: ready_for_deployment</text>
        <text x="440" y="395" fill="#00f2fe" class="cursor">_</text>
      </g>
    </g>
  </g>

  <!-- ================= OSCILLOSCOPE / GRAPH AREA (Left Bottom) ================= -->
  <g>
    <rect x="220" y="90" width="140" height="75" fill="#111827" stroke="#1f2d3d" stroke-width="1.5" rx="6" />
    <text x="230" y="105" fill="#8892b0" font-family="'Fira Code', monospace" font-size="9">E2E_LATENCY (ms)</text>
    
    <!-- Oscilloscope Grid Lines -->
    <line x1="225" y1="130" x2="355" y2="130" stroke="#1f2d3d" stroke-dasharray="2, 2" />
    <line x1="290" y1="95" x2="290" y2="160" stroke="#1f2d3d" stroke-dasharray="2, 2" />

    <!-- Animated Waveform SVG Path -->
    <svg x="225" y="100" width="130" height="55" viewBox="0 0 160 80" preserveAspectRatio="none">
      <defs>
        <clipPath id="wave-clip">
          <rect width="160" height="80" />
        </clipPath>
      </defs>
      <g clip-path="url(#wave-clip)">
        <path d="M 0 40 Q 20 10, 40 40 T 80 40 T 120 40 T 160 40 Q 180 10, 200 40 T 240 40 T 280 40 T 320 40" 
              fill="none" stroke="#39ff14" stroke-width="2.5" class="wave-line" filter="url(#glow-green)" />
      </g>
    </svg>
    <text x="350" y="158" fill="#39ff14" font-family="'Fira Code', monospace" font-size="9" text-anchor="end">42ms</text>
  </g>

</svg>
