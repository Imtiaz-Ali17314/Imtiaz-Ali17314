<svg viewBox="0 0 220 40" width="220" height="40" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .bg { fill: #0b0f19; stroke: #00f2fe; stroke-width: 1.5; rx: 4; }
    .text { fill: #00f2fe; font-family: 'Fira Code', monospace; font-size: 11; font-weight: bold; letter-spacing: 0.5; }
    .dot { fill: #39ff14; animation: pulse 2s infinite; }
  </style>
  <rect width="220" height="40" class="bg" />
  <circle cx="25" cy="20" r="4" class="dot" />
  <text x="40" y="24" class="text">🌐 WWW.IMTIAZALI.DEV</text>
</svg>
