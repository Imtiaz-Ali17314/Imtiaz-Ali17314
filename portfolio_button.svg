<svg viewBox="0 0 220 48" width="220" height="48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Drop Shadow for Neon Glow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#00f2fe" flood-opacity="0.3" />
    </filter>
    <!-- Premium Gradient -->
    <linearGradient id="btn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#7f00ff" />
    </linearGradient>
  </defs>
  <style>
    .btn {
      fill: url(#btn-grad);
      rx: 24px;
    }
    .text {
      fill: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .icon {
      fill: #ffffff;
    }
  </style>
  
  <!-- Pill shape button -->
  <rect width="220" height="48" class="btn" filter="url(#shadow)" rx="24" />
  
  <!-- Globe Website Icon (Material Design Vector) -->
  <g transform="translate(24, 14)">
    <path class="icon" d="M10 0C4.48 0 0 4.48 0 10s4.48 10 10 10 10-4.48 10-10S15.52 0 10 0zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L7 13v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8V8h2c.55 0 1-.45 1-1V5h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
  </g>
  
  <!-- Text -->
  <text x="54" y="29" class="text">Visit Portfolio Website</text>
</svg>
