<svg viewBox="0 0 800 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <!-- Glowing Filters -->
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse-border {
      0%, 100% { stroke: #00f2fe; filter: drop-shadow(0 0 2px #00f2fe); }
      50% { stroke: #39ff14; filter: drop-shadow(0 0 10px #39ff14); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes slide-glitch {
      0% { transform: skewX(0deg); }
      95% { transform: skewX(0deg); }
      96% { transform: skewX(-10deg); }
      97% { transform: skewX(10deg); }
      98% { transform: skewX(0deg); }
    }
    .bg-main { fill: #0b0f19; }
    .border-glowing {
      animation: pulse-border 4s infinite ease-in-out;
    }
    .text-pulse {
      animation: pulse-glow 2s infinite ease-in-out;
    }
    .glitch-effect {
      animation: slide-glitch 5s infinite linear;
    }
    .button-rect {
      fill: #111827;
      stroke: #39ff14;
      stroke-width: 2;
    }
    .button-rect:hover {
      fill: #39ff14;
      stroke: #00f2fe;
      cursor: pointer;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg-main" rx="10" stroke="#1f2d3d" stroke-width="1.5" />
  
  <!-- Glowing Border -->
  <rect x="5" y="5" width="790" height="90" fill="none" class="border-glowing" stroke-width="1.5" rx="8" />

  <!-- Corner indicators -->
  <path d="M 5 25 L 5 5 L 25 5" fill="none" stroke="#00f2fe" stroke-width="2.5" />
  <path d="M 795 25 L 795 5 L 775 5" fill="none" stroke="#00f2fe" stroke-width="2.5" />
  <path d="M 5 75 L 5 95 L 25 95" fill="none" stroke="#00f2fe" stroke-width="2.5" />
  <path d="M 795 75 L 795 95 L 775 95" fill="none" stroke="#00f2fe" stroke-width="2.5" />

  <!-- Left Telemetry text -->
  <g transform="translate(30, 28)" font-family="'Fira Code', monospace">
    <circle cx="10" cy="12" r="5" fill="#39ff14" class="text-pulse" />
    <text x="25" y="16" fill="#8892b0" font-size="12" letter-spacing="1">GATEWAY::LIVE_NODE</text>
    <text x="25" y="38" fill="#c9d1d9" font-size="18" font-weight="bold" letter-spacing="1">WWW.IMTIAZALI.DEV</text>
  </g>

  <!-- Right Call To Action Button -->
  <g transform="translate(460, 20)" class="glitch-effect">
    <!-- Outer shadow ring -->
    <rect x="0" y="0" width="310" height="60" rx="6" fill="none" stroke="#39ff14" stroke-width="1" opacity="0.3" />
    <!-- Actual Button -->
    <rect x="5" y="5" width="300" height="50" rx="4" class="button-rect" />
    
    <!-- Text on Button -->
    <text x="150" y="34" text-anchor="middle" fill="#39ff14" font-family="'Fira Code', monospace" font-size="14" font-weight="bold" letter-spacing="1.5" class="text-pulse">⚡ ENTER PORTFOLIO ⚡</text>
  </g>
</svg>
